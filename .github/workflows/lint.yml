name: Lint & Format
on: [push, pull_request]


jobs:
  lint:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npx eslint . --ext .ts,.tsx

      - run: npx prettier --check "**/*.{ts,tsx,json,md}"

      - run: echo "All lint checks passed!"
