name: Deploy PayDay
on:
  workflow_run:
    workflows: ["PayDay CI"]
    types: [completed]


jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      - name: Deploy to production
        run: echo "Deploying PayDay..."

      - name: Health check
        run: echo "Health check passed"
